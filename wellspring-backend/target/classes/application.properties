# Application Configuration
spring.application.name=wellspring-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/wellspring_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
